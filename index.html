<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>MST Visualizer</title>

<link rel="icon" href="logo.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<!-- ===============================
HEADER
=============================== -->

<header class="main-header">

<div class="title-wrapper">

<img src="logo.svg" class="project-logo" alt="logo">

<div class="title-text">

<h1 class="project-title">MST Visualizer</h1>

<p class="project-subtitle">
Interactive Minimum Spanning Tree Explorer
</p>

</div>

</div>

<div class="header-controls">

<div class="algorithm-selector">

<button id="prims-btn" class="active">Prim</button> <button id="kruskals-btn">Kruskal</button>

</div>

<div class="header-tools">

<label>Speed</label>

<input id="speed-slider" type="range" min="200" max="2000" value="1000">

<button id="physics-toggle" class="tool-btn">Physics</button>

<button id="theme-toggle" class="tool-btn">🌙</button>

</div>

</div>

</header>

<!-- ===============================
MAIN TOOLBAR
=============================== -->

<div class="toolbar">

<div class="group">

<button id="add-vertex-btn" class="tool-btn">+ Vertex</button>

<button id="add-edge-btn" class="tool-btn">— Edge</button>

<button id="clear-btn" class="tool-btn danger">Clear</button>

</div>

<div class="group">

<button id="undo-btn" class="tool-btn">Undo</button>

<button id="redo-btn" class="tool-btn">Redo</button>

</div>

<div class="group">

<button id="import-btn" class="tool-btn">Import</button>

<select id="export-format" class="tool-btn">

<option value="json">JSON</option>

<option value="network">Network JSON</option>

<option value="csv">CSV</option>

<option value="edgelist">Edge List</option>

</select>

<button id="export-btn" class="tool-btn">Export</button>

<button id="gif-btn" class="tool-btn primary">GIF</button>

<input type="file" id="file-input" hidden accept=".json,.csv">

</div>

</div>

<!-- ===============================
PLAYBACK
=============================== -->

<div class="playback">

<button id="run-btn" class="play-btn primary">Run</button>

<button id="pause-btn" class="play-btn">Pause</button>

<button id="step-btn" class="play-btn">Step</button>

<button id="reset-btn" class="play-btn">Reset</button>

</div>

<!-- ===============================
TIMELINE
=============================== -->

<div class="timeline">

<input id="timeline-slider" type="range" min="0" max="0" value="0">

<span id="timeline-label">0</span>

</div>

<!-- ===============================
INTERACTION GUIDE
=============================== -->

<div id="interaction-mode">

Click canvas → Add vertex
Drag vertex → Move vertex
Edge mode → Drag vertex to another vertex

</div>

<!-- ===============================
VISUALIZATION
=============================== -->

<div class="visualization">

<div class="canvas-area">

<canvas id="graph-canvas"></canvas>

</div>

<!-- SIDE PANEL -->

<aside class="side-panel">

<section>

<h3>Algorithm</h3>

<p id="current-algorithm">Prim</p>

</section>

<section>

<h3>Steps</h3>

<p id="frame-description">Ready</p>

</section>

<section>

<h3>MST</h3>

<ul id="mst-edges"></ul>

<p id="total-weight">

Total: 0

</p>

</section>

</aside>

</div>

</div>

<!-- ===============================
EDGE WEIGHT MODAL
=============================== -->

<div id="edge-modal" class="modal">

<div class="modal-content">

<span class="close">×</span>

<h3>Weight</h3>

<input id="edge-weight" type="number" min="1" value="1">

<button id="confirm-edge-btn" class="tool-btn primary">

Confirm

</button>

</div>

</div>

<!-- ===============================
NOTIFICATION
=============================== -->

<div id="notification" class="notification"></div>

<!-- ===============================
SCRIPTS
=============================== -->

<script src="graph.js"></script>

<script src="algorithms.js"></script>

<script src="physics.js"></script>

<script src="recorder.js"></script>

<script src="visualizer.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

</body>
</html>
